<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nik · Разработка — 3D Cyber Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="description" content="Веб-разработка от Nik: сайты для блогеров, лендинги, Telegram-боты на Python.">
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --card-bg: rgba(5, 8, 16, 0.65);
            --text: #EDE6D6;
            --accent: #00FFB2; /* Cyber Neon Green */
            --accent-2: #00E5FF; /* Cyber Cyan */
            --border: rgba(0, 255, 178, 0.15);
            --font-display: 'Space Grotesk', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-code);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        /* --- POST PROCESSING & OVERLAYS --- */
        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom,
                    rgba(255, 255, 255, 0),
                    rgba(255, 255, 255, 0) 50%,
                    rgba(0, 0, 0, 0.25) 50%,
                    rgba(0, 0, 0, 0.25));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 35%, #020306 120%);
            z-index: 11;
            pointer-events: none;
        }

        .noise {
            position: fixed;
            inset: 0;
            z-index: 12;
            opacity: 0.05;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- HUD --- */
        .hud {
            position: fixed;
            inset: 1.5rem;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 10px;
            color: rgba(0, 255, 178, 0.5);
            text-transform: uppercase;
        }

        .hud-top,
        .hud-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hud strong {
            color: var(--accent-2);
        }

        .hud-line {
            flex: 1;
            height: 1px;
            background: rgba(0, 255, 178, 0.2);
            margin: 0 1rem;
            position: relative;
        }

        .hud-line::after {
            content: '';
            position: absolute;
            right: 0;
            top: -2px;
            width: 5px;
            height: 5px;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .hud-nav {
            pointer-events: auto;
            display: flex;
            gap: 1.5rem;
            font-size: 11px;
            letter-spacing: 0.1em;
        }

        .hud-nav a {
            color: rgba(237, 230, 214, 0.6);
            text-decoration: none;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .hud-nav a:hover,
        .hud-nav a.active {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent);
        }

        .center-nav {
            align-self: flex-start;
            margin-top: auto;
            margin-bottom: auto;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            letter-spacing: 0.15em;
        }

        /* --- 3D SCENE --- */
        .viewport {
            position: fixed;
            inset: 0;
            perspective: 1000px;
            overflow: hidden;
            z-index: 1;
        }

        .world {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .item {
            position: absolute;
            left: 0;
            top: 0;
            backface-visibility: hidden;
            transform-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- CARDS & CONTENT --- */
        .card {
            width: 310px;
            height: 420px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            position: relative;
            padding: 2.2rem 1.8rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(0, 255, 178, 0.04), inset 0 0 15px rgba(0, 255, 178, 0.02);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translate(-50%, -50%);
            border-radius: 4px;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(0, 255, 178, 0.2);
            background: rgba(5, 8, 16, 0.85);
        }

        .card::before,
        .card::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .card::before {
            top: -1px;
            left: -1px;
            border-top-color: var(--text);
            border-left-color: var(--text);
        }

        .card::after {
            bottom: -1px;
            right: -1px;
            border-bottom-color: var(--text);
            border-right-color: var(--text);
        }

        .card:hover::before,
        .card:hover::after {
            width: 100%;
            height: 100%;
            border-color: var(--accent);
        }

        .card-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-id {
            color: var(--accent);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
        }

        .card-category {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.15em;
        }

        .card h2 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            line-height: 0.95;
            margin: 1.5rem 0 1rem 0;
            text-transform: uppercase;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.05em;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .card-body {
            font-size: 11px;
            line-height: 1.6;
            color: rgba(237, 230, 214, 0.8);
            margin-bottom: auto;
        }

        .card-footer {
            margin-top: 1.5rem;
            font-size: 8px;
            color: rgba(0, 255, 178, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 0.8rem;
            letter-spacing: 0.1em;
        }

        /* --- BIG TEXT --- */
        .big-text {
            font-family: var(--font-display);
            font-size: 16vw;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1.5px rgba(0, 255, 178, 0.2);
            text-transform: uppercase;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            pointer-events: none;
            letter-spacing: -0.4rem;
            mix-blend-mode: screen;
            transition: text-shadow 0.1s;
        }

        /* --- PARTICLES --- */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-2);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 4px var(--accent-2);
        }

        /* --- SCROLL PROXY --- */
        .scroll-proxy {
            height: 10000vh;
            position: absolute;
            width: 100%;
            z-index: -1;
        }

        a, button {
            pointer-events: auto;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- OVERLAYS -->
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="noise"></div>

    <!-- HUD OVERLAY -->
    <div class="hud">
        <div class="hud-top">
            <span>SYS.READY</span>
            <div class="hud-line"></div>
            <!-- Interactive Navigation HUD -->
            <nav class="hud-nav">
                <a href="index.html">HUB</a>
                <a href="montage.html">МОНТАЖ</a>
                <a href="design.html">ДИЗАЙН</a>
                <a href="dev.html" class="active">КОД</a>
            </nav>
            <div class="hud-line"></div>
            <span>FPS: <strong id="fps">60</strong></span>
        </div>
        <div class="center-nav">
            SCROLL VELOCITY // <strong id="vel-readout">0.00</strong>
        </div>
        <div class="hud-bottom">
            <span>COORD: <strong id="coord">000.000</strong></span>
            <div class="hud-line"></div>
            <span>VER 3.1.2 [BETA]</span>
        </div>
    </div>

    <!-- 3D VIEWPORT -->
    <div class="viewport" id="viewport">
        <div class="world" id="world"></div>
    </div>

    <div class="scroll-proxy"></div>

    <script>
        // --- CONFIGURATION ---
        const CONFIG = {
            zGap: 900,
            starCount: 160,
            camSpeed: 2.2,
            colors: ['#00FFB2', '#00E5FF', '#EDE6D6']
        };

        const itemsData = [
          { type: 'text', text: 'NIK DEV' },
          {
            type: 'card',
            id: '01',
            category: 'PROFILE',
            title: 'WHOAMI',
            content: 'YouTube-блогер 272K подписчиков. Разрабатываю современные, быстрые веб-приложения и автоматизирую бизнес-процессы с помощью Python.',
            stat: 'CPU: NIKITA NEXT'
          },
          {
            type: 'card',
            id: '02',
            category: 'CAPABILITIES',
            title: 'STRENGTHS',
            content: 'Создаю веб-интерфейсы высокой сложности на React и Next.js. Проектирую Telegram-ботов с базами данных, парсеры и интеграции API.',
            stat: 'CONVERSION FOCUS'
          },
          { type: 'text', text: 'SERVICES' },
          {
            type: 'card',
            id: '03',
            category: 'SERVICE_01',
            title: 'ЛЕНДИНГИ',
            content: 'Pixel-perfect верстка из Figma. Плавные анимации, высокая адаптивность, SEO-оптимизация и интеграция форм.',
            stat: 'ОТ 13 000 ₽'
          },
          {
            type: 'card',
            id: '04',
            category: 'SERVICE_02',
            title: 'ВЕБ-САЙТЫ',
            content: 'Полнофункциональные многостраничные сайты, SPA, личные кабинеты на React и Next.js. Интеграция БД и панелей администрирования.',
            stat: 'ОТ 10 000 ₽'
          },
          {
            type: 'card',
            id: '05',
            category: 'SERVICE_03',
            title: 'ИНТЕГРАЦИИ',
            content: 'Создание Telegram-ботов, автоматические парсеры контента, интеграция с CRM, платежными системами и сторонними API.',
            stat: 'ОТ 2 000 ₽'
          },
          { type: 'text', text: 'PROJECTS' },
          {
            type: 'card',
            id: '06',
            category: 'PROJECT_01',
            title: 'FLUX OS',
            content: 'Современная SaaS-панель управления с адаптивной аналитикой. Построен на Next.js 14, App Router, Tailwind CSS и shadcn/ui.',
            stat: 'NEXT.JS 14 / VERCEL'
          },
          {
            type: 'card',
            id: '07',
            category: 'PROJECT_02',
            title: 'SOLAR CO',
            content: 'Корпоративный сайт для международной энергетической компании. Стек: React, Tailwind CSS, Sanity CMS, Framer Motion.',
            stat: 'REACT / SANITY CMS'
          },
          {
            type: 'card',
            id: '08',
            category: 'PROJECT_03',
            title: 'NEYRO BOT',
            content: 'ИИ-автоответчик для Telegram-каналов с умной обработкой запросов клиентов. Разработан на Python, Telethon и SQLite.',
            stat: 'PYTHON / TELETHON'
          },
          {
            type: 'card',
            id: '09',
            category: 'PROJECT_04',
            title: 'PARSER BOT',
            content: 'Система для мониторинга и автоматического анализа метаданных YouTube видео. Разработан на Next.js и YouTube API.',
            stat: 'NEXT.JS / YOUTUBE API'
          },
          { type: 'text', text: 'REVIEWS' },
          {
            type: 'card',
            id: '10',
            category: 'CLIENT_REVIEW',
            title: 'CEO АНДРЕЙ',
            content: '«Заказывал у Никиты сайт-портфолио для нашей команды. Конверсия выросла на 8%, боты работают без сбоев 24/7. Рекомендую!»',
            stat: '100% SATISFACTION'
          },
          { type: 'text', text: 'CONTACTS' },
          {
            type: 'card',
            id: '11',
            category: 'GET_IN_TOUCH',
            title: 'WRITE TO ME',
            content: 'Готов обсудить твой проект! Свяжись со мной через Telegram или Kwork для оценки и разработки плана.',
            stat: '@PYTHONVOIN'
          },
          {
            type: 'card',
            id: '12',
            category: 'LINKS',
            title: 'CHANNELS',
            content: '<div style="display:flex; flex-direction:column; gap:0.8rem; margin-top:0.5rem;"><a href="https://t.me/pythonvoin" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:bold;">→ Telegram (@pythonvoin)</a><a href="mailto:typonik@vk.com" style="color:var(--accent); text-decoration:none; font-weight:bold;">→ Email (typonik@vk.com)</a><a href="https://kwork.ru/user/nikitanext2002" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:bold;">→ Kwork Profile</a></div>',
            stat: 'ONLINE LINKS'
          }
        ];

        const loopSize = itemsData.length * CONFIG.zGap;

        // --- STATE ---
        const state = {
            scroll: 0,
            velocity: 0,
            targetSpeed: 0,
            mouseX: 0,
            mouseY: 0
        };

        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const items = [];

        // --- INIT ---
        function init() {
            // Create Items
            itemsData.forEach((data, i) => {
                const el = document.createElement('div');
                el.className = 'item';

                if (data.type === 'text') {
                    const txt = document.createElement('div');
                    txt.className = 'big-text';
                    txt.innerText = data.text;
                    el.appendChild(txt);
                    items.push({
                        el, type: 'text',
                        x: 0, y: 0, rot: 0,
                        baseZ: -i * CONFIG.zGap
                    });
                } else {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-id">ID-${data.id}</span>
                            <span class="card-category">${data.category}</span>
                        </div>
                        <h2>${data.title}</h2>
                        <div class="card-body">${data.content}</div>
                        <div class="card-footer">
                            <span>NIK_DEV // 2026</span>
                            <strong style="color: var(--accent-2);">${data.stat}</strong>
                        </div>
                    `;
                    el.appendChild(card);

                    // Spiral positioning
                    const angle = (i / itemsData.length) * Math.PI * 4;
                    const x = Math.cos(angle) * (window.innerWidth * 0.28);
                    const y = Math.sin(angle) * (window.innerHeight * 0.25);
                    const rot = (Math.random() - 0.5) * 15;

                    items.push({
                        el, type: 'card',
                        x, y, rot,
                        baseZ: -i * CONFIG.zGap
                    });
                }
                world.appendChild(el);
            });

            // Create Stars
            for (let i = 0; i < CONFIG.starCount; i++) {
                const el = document.createElement('div');
                el.className = 'star';
                world.appendChild(el);
                items.push({
                    el, type: 'star',
                    x: (Math.random() - 0.5) * 3500,
                    y: (Math.random() - 0.5) * 3500,
                    baseZ: -Math.random() * loopSize
                });
            }

            // Events
            window.addEventListener('mousemove', (e) => {
                state.mouseX = (e.clientX / window.innerWidth - 0.5) * 2; // -1 to 1
                state.mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
            }, { passive: true });
        }
        init();

        // --- LENIS ---
        const lenis = new Lenis({
            smooth: true,
            lerp: 0.08,
            direction: 'vertical',
            gestureDirection: 'vertical',
            smoothTouch: true
        });

        lenis.on('scroll', ({ scroll, velocity }) => {
            state.scroll = scroll;
            state.targetSpeed = velocity;
        });

        // --- RAF LOOP ---
        const feedbackVel = document.getElementById('vel-readout');
        const feedbackFPS = document.getElementById('fps');
        let lastTime = 0;

        function raf(time) {
            lenis.raf(time);

            // FPS Calculation
            const delta = time - lastTime;
            lastTime = time;
            if (time % 10 < 1 && delta > 0) {
                feedbackFPS.innerText = Math.round(1000 / delta);
            }

            // Smooth Velocity
            state.velocity += (state.targetSpeed - state.velocity) * 0.1;

            // HUD Updates
            feedbackVel.innerText = Math.abs(state.velocity).toFixed(2);
            document.getElementById('coord').innerText = `${state.scroll.toFixed(0)}`;

            // --- RENDER LOGIC ---

            // Camera Tilt & Shake
            const tiltX = state.mouseY * 5 - state.velocity * 0.5;
            const tiltY = state.mouseX * 5;

            world.style.transform = `
                rotateX(${tiltX}deg) 
                rotateY(${tiltY}deg)
            `;

            // Dynamic Perspective (Warp Speed Effect)
            const baseFov = 1000;
            const fov = baseFov - Math.min(Math.abs(state.velocity) * 12, 600);
            viewport.style.perspective = `${fov}px`;

            // Item loop
            const cameraZ = state.scroll * CONFIG.camSpeed;

            items.forEach(item => {
                let relZ = item.baseZ + cameraZ;
                const modC = loopSize;

                // Infinite wrapping
                let vizZ = ((relZ % modC) + modC) % modC;
                if (vizZ > 500) vizZ -= modC; // Wrap back

                // Opacity calculations
                let alpha = 1;
                if (vizZ < -3500) alpha = 0;
                else if (vizZ < -2500) alpha = (vizZ + 3500) / 1000;

                if (vizZ > 100 && item.type !== 'star') {
                    alpha = 1 - ((vizZ - 100) / 400);
                }

                if (alpha < 0) {
                    alpha = 0;
                }
                item.el.style.opacity = alpha;

                if (alpha > 0) {
                    let trans = `translate3d(${item.x}px, ${item.y}px, ${vizZ}px)`;

                    if (item.type === 'star') {
                        // Stretch stars when speed is high
                        const stretch = Math.max(1, Math.min(1 + Math.abs(state.velocity) * 0.12, 10));
                        trans += ` scale3d(1, 1, ${stretch})`;
                    } else if (item.type === 'text') {
                        trans += ` rotateZ(${item.rot}deg)`;
                        // Chromatic Aberration splitting effect
                        if (Math.abs(state.velocity) > 1.2) {
                            const offset = state.velocity * 2.5;
                            item.el.style.textShadow = `${offset}px 0 rgba(255, 0, 60, 0.7), ${-offset}px 0 rgba(0, 243, 255, 0.7)`;
                        } else {
                            item.el.style.textShadow = 'none';
                        }
                    } else {
                        // Card floats slightly
                        const t = time * 0.001;
                        const float = Math.sin(t + item.x) * 6;
                        trans += ` rotateZ(${item.rot}deg) rotateY(${float}deg)`;
                    }

                    item.el.style.transform = trans;
                }
            });

            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
    </script>
</body>
</html>
